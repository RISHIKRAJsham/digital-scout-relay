<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Scout | Enterprise Edge Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2.5rem; letter-spacing: 2px; }
        .status-bar { display: flex; justify-content: space-between; background: #1e293b; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #10b981; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; min-height: 400px; max-height: 600px; overflow-y: auto; }
        .panel h2 { margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; color: #94a3b8; font-size: 1.2rem; }
        .log { margin-bottom: 10px; padding: 10px; border-radius: 4px; background: #0f172a; border-left: 3px solid #38bdf8; font-family: monospace; }
        .log.ai { border-left-color: #a855f7; color: #d8b4fe; }
        .log.security { border-left-color: #f59e0b; color: #fcd34d; background: #451a03; }
        .btn { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; margin-top: -5px; }
        .btn:hover { background: #059669; }
        .timestamp { color: #64748b; font-size: 0.8em; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DIGITAL SCOUT</h1>
        <p style="color: #64748b; margin-top: 5px;">Zero-Trust AI Edge Middleware</p>
    </div>

    <div class="status-bar">
        <div><strong>Cloud Relay:</strong> <span id="conn-status" style="color: #f59e0b;">Connecting...</span></div>
        <div><strong>Edge Nodes:</strong> <span id="node-status" style="color: #94a3b8;">0 Active</span></div>
    </div>

    <div class="grid">
        <div class="panel">
            <h2>Live Operations Feed</h2>
            <div id="ops-feed"></div>
        </div>

        <div class="panel">
            <h2>Admin Staging Area (Zero-Trust)</h2>
            <div id="security-feed"></div>
        </div>
    </div>

    <script>
        // 🚨 CRITICAL: Ensure this matches your Render URL exactly
        const ws = new WebSocket('wss://digital-scout-relay.onrender.com');

        const connStatus = document.getElementById('conn-status');
        const nodeStatus = document.getElementById('node-status');
        const opsFeed = document.getElementById('ops-feed');
        const securityFeed = document.getElementById('security-feed');
        
        let connectedNodes = 0;

        ws.onopen = () => {
            connStatus.innerText = "ONLINE (Encrypted)";
            connStatus.style.color = "#10b981";
            // Handshake Role
            ws.send(JSON.stringify({ role: "dashboard" }));
            addLog(opsFeed, "System", "Encrypted connection to cloud relay established.");
        };

        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);

            if (payload.type === "system") {
                // When an edge node connects, increment and update the UI
                if(payload.message.includes("connected")) {
                    connectedNodes = 1; // Simplified for MVP: assuming 1 node for demo
                    nodeStatus.innerText = `${connectedNodes} Active`;
                    nodeStatus.style.color = "#10b981";
                }
                addLog(opsFeed, "Edge Infrastructure", payload.message);
            }
            else if (payload.type === "user_msg") {
                addLog(opsFeed, "Incoming Query", `"${payload.message}"`);
            }
            else if (payload.type === "ai_reply") {
                addLog(opsFeed, "Gemini AI Core", payload.message, "ai");
            }
            else if (payload.type === "ai_action") {
                addLog(opsFeed, "Autopilot Action", payload.message, "ai");
            }
            else if (payload.type === "ai_action_locked") {
                // Passing the full payload.data so we can extract target, status, AND business context
                addSecurityLock(payload.data);
            }
            else if (payload.type === "system_success") {
                addLog(opsFeed, "Database Engine", payload.message, "log");
            }
        };

        function getTimestamp() {
            return new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
        }

        function addLog(container, title, message, className = "log") {
            const div = document.createElement('div');
            div.className = `log ${className}`;
            div.innerHTML = `<strong>[${title}]</strong> <span class="timestamp">${getTimestamp()}</span><br>${message}`;
            container.prepend(div);
        }

        function addSecurityLock(data) {
            const div = document.createElement('div');
            div.className = `log security`;
            div.id = data.lockId;
            
            // Note: In Phase 2, we will pull the actual business name from clients.json dynamically
            // For the demo, we are appending a high-trust placeholder tag.
            const businessTag = "— Target Infrastructure";

            div.innerHTML = `
                <button class="btn" onclick="approveAction('${data.lockId}')">APPROVE</button>
                <strong>⚠️ STAGED ACTION: Requires Admin Approval</strong> <span class="timestamp">${getTimestamp()}</span><br>
                AI wants to mark <u>${data.target}</u> as <u>${data.status}</u> ${businessTag}. UTR is unverified.
            `;
            securityFeed.prepend(div);
        }

        function approveAction(lockId) {
            ws.send(JSON.stringify({ role: "dashboard_approval", lock_id: lockId }));
            const lockDiv = document.getElementById(lockId);
            lockDiv.innerHTML = `<strong>✅ APPROVED</strong> <span class="timestamp">${getTimestamp()}</span><br>Command pushed to Edge Node.`;
            lockDiv.style.background = "#064e3b";
            lockDiv.style.borderLeftColor = "#10b981";
        }
    </script>
</body>
</html>
